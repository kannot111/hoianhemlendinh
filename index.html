<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hội Anh Em Lên Đỉnh Cùng Nhau</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Style vùng hiển thị nội dung trực quan */
        .rich-content p { margin-bottom: 0.75rem; }
        .rich-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .rich-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .rich-content a { color: #22d3ee; text-decoration: underline; font-weight: 600; }
        .rich-content a:hover { color: #67e8f9; }
        .rich-content img { max-width: 100%; height: auto; border-radius: 0.5rem; margin: 1rem 0; display: block; }
        /* Giữ kiểu hiển thị cho vùng soạn thảo */
        #visual-editor-box[contenteditable="true"]:empty:before {
            content: attr(placeholder);
            color: #4b5563;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col justify-between selection:bg-cyan-500 selection:text-black">

    <header class="border-b border-gray-800 bg-gray-900/60 backdrop-blur sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 onclick="showGeneralInfo()" class="text-xl md:text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-indigo-500 tracking-wider cursor-pointer hover:opacity-80 transition">
                HỘI ANH EM LÊN ĐỈNH CÙNG NHAU
            </h1>
            <button onclick="openEditor('general', 1)" class="px-3 py-1.5 bg-gray-900 hover:bg-gray-800 text-xs md:text-sm font-semibold rounded-lg border border-gray-700 transition flex items-center gap-1.5">
                📝 Sửa trang chủ
            </button>
        </div>
    </header>

    <main class="max-w-5xl w-full mx-auto px-4 py-8 flex-grow space-y-12">
        
        <section class="bg-gray-900 border border-gray-800 rounded-2xl p-6 md:p-8 shadow-2xl relative">
            
            <div id="view-mode">
                <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
                    <h2 id="main-view-title" class="text-xl font-bold text-cyan-400">🏠 Giới Thiệu Chung</h2>
                    <div id="member-action-buttons" class="hidden gap-2">
                        <button id="btn-edit-member" class="px-3 py-1 bg-gray-800 hover:bg-gray-700 border border-gray-700 text-xs rounded-md">Sửa profile</button>
                        <button id="btn-delete-member" class="px-3 py-1 bg-red-950/50 hover:bg-red-900/50 border border-red-800 text-xs text-red-400 rounded-md">Xóa Thành Viên</button>
                    </div>
                </div>
                <div id="main-view-content" class="rich-content text-gray-300 leading-relaxed min-h-[100px]">
                    Đang tải dữ liệu anh em...
                </div>
            </div>

            <div id="editor-mode" class="hidden space-y-4">
                <div class="flex justify-between items-center border-b border-gray-800 pb-3">
                    <h3 id="editor-title" class="text-lg font-bold text-amber-400">📝 Sửa nội dung trực quan</h3>
                    <button onclick="closeEditor()" class="text-sm bg-gray-800 hover:bg-gray-700 px-3 py-1 rounded-lg">Hủy</button>
                </div>
                
                <div id="tip-inputs" class="grid grid-cols-1 md:grid-cols-2 gap-3 hidden">
                    <input type="text" id="input-tip-title" placeholder="Nhập tiêu đề mẹo / tips..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500">
                    <input type="text" id="input-tip-author" placeholder="Tên người gõ..." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-amber-500">
                </div>

                <div class="flex flex-wrap gap-1 bg-gray-950 p-2 rounded-xl border border-gray-800 text-xs text-gray-300 sticky top-16 z-30">
                    <button onclick="execCmd('bold')" title="Chữ đậm" class="px-3 py-1.5 bg-gray-900 hover:bg-gray-800 rounded font-bold border border-gray-800">B</button>
                    <button onclick="execCmd('italic')" title="Chữ nghiêng" class="px-3 py-1.5 bg-gray-900 hover:bg-gray-800 rounded italic border border-gray-800">I</button>
                    <button onclick="execCmd('underline')" title="Gạch chân" class="px-3 py-1.5 bg-gray-900 hover:bg-gray-800 rounded underline border border-gray-800">U</button>
                    
                    <span class="text-gray-700 px-1 self-center">|</span>
                    
                    <select onchange="execCmd('fontName', this.value)" class="bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs focus:outline-none text-cyan-400">
                        <option value="Inter">Font mặc định</option>
                        <option value="Arial">Arial</option>
                        <option value="Courier New">Courier New (Mã lệnh)</option>
                        <option value="Times New Roman">Times New Roman</option>
                    </select>

                    <select onchange="execCmd('fontSize', this.value)" class="bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs focus:outline-none text-green-400">
                        <option value="3">Cỡ vừa</option>
                        <option value="4">Cỡ lớn</option>
                        <option value="6">Cỡ cực đại</option>
                        <option value="2">Cỡ nhỏ</option>
                    </select>

                    <select onchange="execCmd('foreColor', this.value)" class="bg-gray-900 border border-gray-800 rounded px-2 py-1 text-xs focus:outline-none text-amber-400">
                        <option value="#f3f4f6">Màu chữ</option>
                        <option value="#22d3ee">Xanh Cyan</option>
                        <option value="#f59e0b">Vàng Hổ Phách</option>
                        <option value="#10b981">Xanh Lá</option>
                        <option value="#ef4444">Đỏ Đậm</option>
                    </select>

                    <span class="text-gray-700 px-1 self-center">|</span>

                    <button onclick="insertLinkTool()" class="px-2.5 py-1.5 bg-gray-900 hover:bg-gray-800 rounded border border-gray-800 text-cyan-400 font-semibold">🔗 Link Web</button>
                    
                    <input type="file" id="image-file-input" accept="image/*" class="hidden" onchange="uploadAndInsertImage(this)">
                    <button onclick="document.getElementById('image-file-input').click()" id="btn-upload-img" class="px-2.5 py-1.5 bg-gray-900 hover:bg-gray-800 rounded border border-gray-800 text-green-400 font-semibold flex items-center gap-1">
                        🖼️ Up ảnh từ máy
                    </button>
                </div>

                <div id="visual-editor-box" contenteditable="true" placeholder="Bôi đen văn bản để đổi font, màu, in đậm nghiêng... Nhấn nút Ảnh để chọn file ảnh từ máy tính/điện thoại." class="w-full min-h-[300px] max-h-[500px] overflow-y-auto bg-gray-950 border border-gray-800 rounded-xl p-4 text-gray-200 focus:outline-none focus:border-cyan-500 rich-content"></div>
                
                <div class="flex justify-end gap-3">
                    <button onclick="closeEditor()" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-xl text-sm font-semibold transition">Hủy bỏ</button>
                    <button onclick="saveData()" class="px-5 py-2 bg-gradient-to-r from-cyan-500 to-blue-600 text-sm font-semibold rounded-xl transition shadow-lg shadow-cyan-500/10">Lưu lại ngay</button>
                </div>
            </div>
        </section>

        <section class="space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <span class="w-2 h-6 bg-cyan-500 rounded-full"></span> Thành Viên Nhóm
                </h2>
                <button onclick="addMemberPrompt()" class="px-4 py-2 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 font-semibold text-sm rounded-xl shadow-lg shadow-cyan-500/10 transition">
                    + Thêm thành viên
                </button>
            </div>
            <div id="member-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                </div>
        </section>

        <section class="space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <span class="w-2 h-6 bg-amber-500 rounded-full"></span> Báo Người Gõ (Tips & Mẹo Tin Học)
                </h2>
                <button onclick="openEditor('tip')" class="px-4 py-2 bg-amber-600/20 hover:bg-amber-600/30 text-amber-400 border border-amber-500/30 font-semibold text-sm rounded-xl transition">
                    + Đăng bài mới
                </button>
            </div>
            <div id="tips-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </section>
    </main>

    <footer class="border-t border-gray-900 bg-gray-950 py-6 text-center text-xs text-gray-500">
        &copy; 2026 Hội Anh Em Lên Đỉnh Cùng Nhau.
    </footer>

    <script>
        // 1. CẤU HÌNH SUPABASE (ĐIỀN URL VÀ KEY CỦA BẠN VÀO ĐÂY)
        const SUPABASE_URL = "https://hffdlldutogxyfuojvbz.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmZmRsbGR1dG9neHlmdW9qdmJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NDU2NzQsImV4cCI6MjA5NjAyMTY3NH0.nYNqoJkMV5_MiJA1jtdsStjNG2nhCLYbxKZzc5naBEY";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const MASTER_PASSWORD = "ontop123";

        // Trạng thái toàn cục
        let currentMode = ''; // 'general', 'member', 'tip'
        let currentId = null;
        let cachedGeneralIntro = '';

        window.addEventListener('DOMContentLoaded', async () => {
            await loadGeneralIntro();
            await loadMembers();
            await loadTips();
        });

        function checkPassword() {
            const pwd = prompt("Nhập mật khẩu tối cao của anh em:");
            if (pwd === MASTER_PASSWORD) return true;
            if (pwd !== null) alert("Sai mật khẩu rồi!");
            return false;
        }

        // Tải trang chủ
        async function loadGeneralIntro() {
            const { data } = await _supabase.from('intro_chung').select('content').eq('id', 1).single();
            if (data) {
                cachedGeneralIntro = data.content;
                showGeneralInfo();
            }
        }

        function showGeneralInfo() {
            closeEditor();
            document.getElementById('main-view-title').innerHTML = "🏠 Giới Thiệu Chung";
            document.getElementById('main-view-content').innerHTML = cachedGeneralIntro;
            document.getElementById('member-action-buttons').style.display = 'none';
        }

        // Tải thành viên
        async function loadMembers() {
            const { data } = await _supabase.from('thanh_vien').select('*').order('id', { ascending: true });
            const listContainer = document.getElementById('member-list');
            listContainer.innerHTML = '';
            
            if (data && data.length > 0) {
                data.forEach(m => {
                    listContainer.innerHTML += `
                        <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl flex flex-col justify-between items-center hover:border-cyan-500/50 transition shadow-lg group">
                            <span onclick="viewMember(${m.id}, '${m.name}')" class="font-semibold text-center text-gray-200 hover:text-cyan-400 cursor-pointer transition py-2 block w-full truncate">${m.name}</span>
                            <button onclick="openEditor('member', ${m.id}, '${m.name}')" class="mt-2 text-[11px] bg-gray-950 text-gray-400 group-hover:text-white group-hover:bg-gray-800 px-3 py-1 rounded-md border border-gray-800 transition">Sửa Profile</button>
                        </div>
                    `;
                });
            } else {
                listContainer.innerHTML = `<p class="text-xs text-gray-600 col-span-full text-center">Chưa có thành viên nào.</p>`;
            }
        }

        async function viewMember(id, name) {
            closeEditor();
            document.getElementById('main-view-content').innerHTML = "Đang tải profile...";
            const { data } = await _supabase.from('thanh_vien').select('content').eq('id', id).single();
            
            document.getElementById('main-view-title').innerHTML = `👤 Thành viên: ${name}`;
            document.getElementById('main-view-content').innerHTML = data?.content || `<p class="text-gray-500 italic">Thành viên này lười quá chưa viết gì cả.</p>`;
            
            const actions = document.getElementById('member-action-buttons');
            actions.style.display = 'flex';
            document.getElementById('btn-edit-member').setAttribute('onclick', `openEditor('member', ${id}, '${name}')`);
            document.getElementById('btn-delete-member').setAttribute('onclick', `deleteMember(${id}, '${name}')`);
        }

        // Tải các bài viết kiến thức (Báo người gõ)
        async function loadTips() {
            const { data } = await _supabase.from('bao_nguoi_go').select('*').order('id', { ascending: false });
            const tipsContainer = document.getElementById('tips-list');
            tipsContainer.innerHTML = '';

            if (data && data.length > 0) {
                data.forEach(t => {
                    tipsContainer.innerHTML += `
                        <div class="bg-gray-900 border border-gray-800 p-5 rounded-xl space-y-4 shadow-xl relative group">
                            <div class="flex justify-between items-start gap-4 border-b border-gray-800 pb-2">
                                <div>
                                    <h3 class="text-base font-bold text-amber-400">${t.title}</h3>
                                    <p class="text-[11px] text-gray-500 mt-0.5">💻 Người gõ: <span class="text-gray-400 font-medium">${t.author}</span></p>
                                </div>
                                <div class="opacity-0 group-hover:opacity-100 transition flex gap-1.5 absolute top-4 right-4 bg-gray-900 pl-2">
                                    <button onclick="openEditor('tip', ${t.id})" class="text-[11px] bg-gray-800 text-gray-300 hover:text-white px-2 py-0.5 rounded border border-gray-700">Sửa</button>
                                    <button onclick="deleteTip(${t.id})" class="text-[11px] bg-red-950/40 text-red-400 hover:text-red-300 px-2 py-0.5 rounded border border-red-900">Xóa</button>
                                </div>
                            </div>
                            <div class="rich-content text-sm text-gray-400 leading-relaxed">
                                ${t.content}
                            </div>
                        </div>
                    `;
                });
            } else {
                tipsContainer.innerHTML = `<p class="text-xs text-gray-600 text-center col-span-full py-4">Chưa có mẹo nào được đăng tải.</p>`;
            }
        }

        // HÀM LỆNH THAY ĐỔI TRỰC QUAN KHI BÔI ĐEN VĂN BẢN
        function execCmd(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('visual-editor-box').focus();
        }

        function insertLinkTool() {
            let url = prompt("Nhập địa chỉ web (Ví dụ: bio.hminhh.click hoặc google.com):");
            if (!url) return;
            
            url = url.trim();
            if (!/^https?:\/\//i.test(url)) {
                url = "https://" + url;
            }
            
            execCmd('createLink', url);
            
            const editorBox = document.getElementById('visual-editor-box');
            const links = editorBox.getElementsByTagName('a');
            for (let i = 0; i < links.length; i++) {
                if (links[i].href === url || links[i].getAttribute('href') === url) {
                    links[i].setAttribute('target', '_blank');
                }
            }
        }

        // TÍNH NĂNG ĐẨY ẢNH TRỰC TIẾP LÊN SUPABASE STORAGE
        async function uploadAndInsertImage(input) {
            const file = input.files[0];
            if (!file) return;

            const btn = document.getElementById('btn-upload-img');
            const oldText = btn.innerHTML;
            btn.innerHTML = "⏳ Đang up ảnh...";
            btn.disabled = true;

            // Tạo tên file ngẫu nhiên để tránh trùng lặp trên server
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}-${Math.floor(Math.random() * 1000)}.${fileExt}`;
            const filePath = `${fileName}`;

            try {
                // Đẩy file lên Bucket 'anh_nhom' của Supabase
                const { data, error } = await _supabase.storage
                    .from('anh_nhom')
                    .upload(filePath, file);

                if (error) throw error;

                // Lấy link URL công khai của ảnh vừa upload
                const { data: publicUrlData } = _supabase.storage
                    .from('anh_nhom')
                    .getPublicUrl(filePath);

                const publicUrl = publicUrlData.publicUrl;

                // Chèn ảnh vào con trỏ chuột trong Editor
                execCmd('insertImage', publicUrl);
            } catch (err) {
                alert("Lỗi up ảnh rồi bạn ơi: " + err.message);
            } finally {
                btn.innerHTML = oldText;
                btn.disabled = false;
                input.value = ''; // Reset input file
            }
        }

        // MỞ TRÌNH SOẠN THẢO TRỰC QUAN
        async function openEditor(mode, id = null, extraData = '') {
            if (!checkPassword()) return;

            currentMode = mode;
            currentId = id;

            document.getElementById('view-mode').classList.add('hidden');
            document.getElementById('editor-mode').classList.remove('hidden');
            document.getElementById('tip-inputs').classList.add('hidden');

            const editorBox = document.getElementById('visual-editor-box');
            editorBox.innerHTML = '';

            if (mode === 'general') {
                document.getElementById('editor-title').innerText = "📝 Đang sửa: Giới thiệu chung trang chủ";
                editorBox.innerHTML = cachedGeneralIntro;
            } 
            else if (mode === 'member') {
                document.getElementById('editor-title').innerText = `👤 Đang sửa Profile của: ${extraData}`;
                const { data } = await _supabase.from('thanh_vien').select('content').eq('id', id).single();
                editorBox.innerHTML = data?.content || '';
            } 
            else if (mode === 'tip') {
                document.getElementById('editor-title').innerText = id ? "⚡ Hiệu chỉnh mẹo tin học" : "🚀 Đăng bài mẹo / kiến thức mới";
                document.getElementById('tip-inputs').classList.remove('hidden');
                
                if (id) {
                    const { data } = await _supabase.from('bao_nguoi_go').select('*').eq('id', id).single();
                    if (data) {
                        document.getElementById('input-tip-title').value = data.title;
                        document.getElementById('input-tip-author').value = data.author;
                        editorBox.innerHTML = data.content;
                    }
                } else {
                    document.getElementById('input-tip-title').value = '';
                    document.getElementById('input-tip-author').value = '';
                }
            }
        }

        function closeEditor() {
            document.getElementById('editor-mode').classList.add('hidden');
            document.getElementById('view-mode').classList.remove('hidden');
        }

        // LƯU DỮ LIỆU ĐÃ CHỈNH SỬA
        async function saveData() {
            const finalHtml = document.getElementById('visual-editor-box').innerHTML;

            if (currentMode === 'general') {
                const { error } = await _supabase.from('intro_chung').update({ content: finalHtml }).eq('id', 1);
                if (!error) {
                    cachedGeneralIntro = finalHtml;
                    showGeneralInfo();
                } else alert("Lỗi lưu trang chủ: " + error.message);
            } 
            
            else if (currentMode === 'member') {
                const { error } = await _supabase.from('thanh_vien').update({ content: finalHtml }).eq('id', currentId);
                if (!error) {
                    const titleText = document.getElementById('main-view-title').innerText;
                    const name = titleText.replace("👤 Thành viên: ", "");
                    await viewMember(currentId, name);
                } else alert("Lỗi lưu profile: " + error.message);
            } 
            
            else if (currentMode === 'tip') {
                const title = document.getElementById('input-tip-title').value.trim();
                const author = document.getElementById('input-tip-author').value.trim();
                
                if (!title || !author) {
                    alert("Vui lòng nhập tiêu đề bài viết và tên người gõ!");
                    return;
                }

                if (currentId) {
                    await _supabase.from('bao_nguoi_go').update({ title, author, content: finalHtml }).eq('id', currentId);
                } else {
                    await _supabase.from('bao_nguoi_go').insert([{ title, author, content: finalHtml }]);
                }
                showGeneralInfo();
                await loadTips();
            }
        }

        // Thêm member
        async function addMemberPrompt() {
            if (!checkPassword()) return;
            const name = prompt("Nhập tên thành viên mới:");
            if (!name) return;

            const { error } = await _supabase.from('thanh_vien').insert([{ name: name, content: '' }]);
            if (!error) {
                alert(`Đã thêm ${name}!`);
                await loadMembers();
            }
        }

        // Xóa member
        async function deleteMember(id, name) {
            if (!checkPassword()) return;
            if (!confirm(`Xóa [${name}] nhé bạn?`)) return;

            const { error } = await _supabase.from('thanh_vien').delete().eq('id', id);
            if (!error) {
                showGeneralInfo();
                await loadMembers();
            }
        }

        // Xóa bài viết tip
        async function deleteTip(id) {
            if (!checkPassword()) return;
            if (!confirm("Xóa bài viết kiến thức này nhé bạn?")) return;

            const { error } = await _supabase.from('bao_nguoi_go').delete().eq('id', id);
            if (!error) await loadTips();
        }
    </script>
</body>
</html>
